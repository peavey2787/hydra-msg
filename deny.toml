# HYDRA-MSG dependency supply-chain policy.
# This file is consumed by `cargo deny check advisories bans licenses sources`.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# These exact older-generation crates are pulled by the stable scrypt/X25519/
# ChaCha20 stack while the post-quantum stack uses the newer RustCrypto APIs.
# Keep this list exact so cargo-deny still warns on every new duplicate version.
skip = [
    { name = "block-buffer", version = "=0.10.4" },
    { name = "cpufeatures", version = "=0.2.17" },
    { name = "crypto-common", version = "=0.1.7" },
    { name = "digest", version = "=0.10.7" },
    { name = "hmac", version = "=0.12.1" },
    { name = "rand_core", version = "=0.6.4" },
]
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "GPL-2.0-or-later",
    "MIT",
    "Unicode-3.0",
]
unused-allowed-license = "warn"


[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
