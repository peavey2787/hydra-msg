name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  rust-and-policy:
    name: Rust, policy, and examples
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup target add wasm32-unknown-unknown --toolchain stable
          rustup default stable

      - name: Install required QA tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
          cargo install wasm-pack --locked

      - name: Run tests, static policy gates, and examples
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          ./qa/ci/check-all.sh --through examples --skip-permissions 2>&1 \
            | tee target/ci-logs/rust-policy-examples.log

      - name: Upload core CI evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-ci-${{ github.sha }}
          path: target/ci-logs/rust-policy-examples.log
          if-no-files-found: error
          retention-days: 30

  browser-lifecycle:
    name: Browser lifecycle
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: qa/browser/playwright/package-lock.json

      - name: Run real-browser lifecycle suite
        env:
          HYDRA_RUN_BROWSER_E2E: "1"
          HYDRA_PLAYWRIGHT_INSTALL_DEPS: "1"
          HYDRA_BROWSER_WORKERS: "1"
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          ./qa/ci/check-all.sh --only browser --skip-permissions 2>&1 \
            | tee target/ci-logs/browser.log

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-lifecycle-${{ github.sha }}
          path: |
            target/ci-logs/browser.log
            qa/browser/playwright/test-results/
            qa/browser/playwright/playwright-report/
          if-no-files-found: warn
          retention-days: 30

  fuzz-regression:
    name: Deterministic fuzz regression
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Fetch locked workspace dependencies
        run: cargo fetch --locked

      - name: Run deterministic fuzz corpus gate
        run: |
          # Keep upload inputs under the workspace. upload-artifact v7 runs in a
          # container on Linux, where runner.temp can resolve to a different mount.
          log_dir="$GITHUB_WORKSPACE/ci-logs"
          log_file="$log_dir/fuzz-regression.log"
          mkdir -p "$log_dir"
          set -o pipefail
          ./qa/ci/fuzz/check-fuzz.sh 2>&1 | tee "$log_file"
          test -s "$log_file"

      - name: Upload fuzz regression evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-regression-${{ github.sha }}
          path: ci-logs/fuzz-regression.log
          if-no-files-found: error
          retention-days: 30

  summary:
    name: CI summary
    if: always()
    needs:
      - rust-and-policy
      - browser-lifecycle
      - fuzz-regression
    runs-on: ubuntu-24.04
    steps:
      - name: Publish commit validation summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF2
          # HYDRA-MSG CI

          Commit: \`${{ github.sha }}\`

          | Gate | Result |
          |---|---|
          | Rust, policy, and examples | ${{ needs['rust-and-policy'].result }} |
          | Browser lifecycle | ${{ needs['browser-lifecycle'].result }} |
          | Deterministic fuzz regression | ${{ needs['fuzz-regression'].result }} |

          Complete console logs are attached to this workflow run as commit-named artifacts.
          EOF2
