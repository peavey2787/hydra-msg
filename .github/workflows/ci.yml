name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  core:
    name: Core bounded CI
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: qa/browser/playwright/package-lock.json

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup target add wasm32-unknown-unknown --toolchain stable
          rustup default stable

      - name: Install required bounded QA tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
          cargo install wasm-pack --locked

      - name: Fetch committed lock graph
        run: cargo fetch --locked

      - name: Run bounded core validation
        shell: bash
        run: |
          mkdir -p target/ci-logs
          log_file="target/ci-logs/core.log"
          printf '%s\n' \
            "HYDRA-MSG bounded core CI" \
            "Commit: $GITHUB_SHA" > "$log_file"
          set -o pipefail
          {
            ./qa/ci/core/check-tests.sh --skip-vectors --skip-release-static
            ./qa/ci/core/check-examples.sh
          } 2>&1 | tee -a "$log_file"

      - name: Upload core evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-${{ github.sha }}
          path: target/ci-logs/core.log
          if-no-files-found: warn
          retention-days: 30

  browser-lifecycle:
    name: Browser lifecycle
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      HYDRA_BROWSER_WORKERS: "1"
      HYDRA_PLAYWRIGHT_INSTALL_DEPS: "1"
      HYDRA_RUN_BROWSER_E2E: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: qa/browser/playwright/package-lock.json

      - name: Run browser lifecycle evidence
        shell: bash
        run: |
          mkdir -p target/ci-logs
          log_file="target/ci-logs/browser-lifecycle.log"
          printf '%s\n' \
            "HYDRA-MSG browser lifecycle CI" \
            "Commit: $GITHUB_SHA" > "$log_file"
          set -o pipefail
          ./qa/ci/reliability/check-browser-e2e.sh 2>&1 | tee -a "$log_file"

      - name: Upload browser lifecycle evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-lifecycle-${{ github.sha }}
          path: |
            target/ci-logs/browser-lifecycle.log
            qa/browser/playwright/test-results/
            qa/browser/playwright/playwright-report/
          if-no-files-found: warn
          retention-days: 30

  deterministic-fuzz:
    name: Deterministic fuzz regression
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run deterministic fuzz regression
        shell: bash
        run: |
          mkdir -p target/ci-logs
          log_file="target/ci-logs/fuzz-regression.log"
          printf '%s\n' \
            "HYDRA-MSG deterministic fuzz regression" \
            "Commit: $GITHUB_SHA" > "$log_file"
          set -o pipefail
          {
            cargo fetch --locked
            ./qa/ci/fuzz/check-fuzz.sh
          } 2>&1 | tee -a "$log_file"

      - name: Upload deterministic fuzz evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-regression-${{ github.sha }}
          path: target/ci-logs/fuzz-regression.log
          if-no-files-found: warn
          retention-days: 30

  summary:
    name: CI summary
    if: always()
    needs:
      - core
      - browser-lifecycle
      - deterministic-fuzz
    runs-on: ubuntu-24.04
    steps:
      - name: Publish commit validation summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF2
          # HYDRA-MSG CI

          Commit: \`${{ github.sha }}\`

          | Gate | Result |
          |---|---|
          | Core bounded CI | ${{ needs.core.result }} |
          | Browser lifecycle | ${{ needs.browser-lifecycle.result }} |
          | Deterministic fuzz regression | ${{ needs.deterministic-fuzz.result }} |

          Local exhaustive validation remains `./qa/ci/check-all.sh`; normal GitHub CI runs bounded commit gates and uploads evidence logs.
          EOF2
